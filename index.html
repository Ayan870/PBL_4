<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PBL System – Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="assets/css/theme-dark-purple.css" rel="stylesheet"/>
  <style>
    body { background: #f4f6f9; }
    .login-card { max-width: 420px; margin: 80px auto; }
    .brand-title { color: #4f46e5; font-weight: 700; }
    .role-btn.active { background: #4f46e5; color: #fff; border-color: #4f46e5; }
    .btn-login { background: #4f46e5; border-color: #4f46e5; }
    .btn-login:hover { background: #4338ca; border-color: #4338ca; }
  </style>
</head>
<body>

<div class="login-card px-3">
  <div class="text-center mb-4">
    <i class="bi bi-mortarboard-fill fs-1 text-primary"></i>
    <h3 class="brand-title mt-2">PBL System</h3>
    
  </div>

  <div class="card shadow-sm border-0">
    <div class="card-body p-4">
      <h5 class="card-title mb-1">Sign In</h5>
      <p class="text-muted small mb-3">Login to your account</p>

      <div class="btn-group w-100 mb-3" role="group">
        <button class="btn btn-outline-primary role-btn active" onclick="selectRole('student', this)">Student</button>
        <button class="btn btn-outline-primary role-btn" onclick="selectRole('supervisor', this)">Supervisor</button>
        <button class="btn btn-outline-primary role-btn" onclick="selectRole('manager', this)">PBL Manager</button>
        <button class="btn btn-outline-primary role-btn" onclick="selectRole('evaluator', this)">Evaluator</button>
      </div>

      <form onsubmit="handleLogin(event)">
        <div class="mb-3" id="loginRollGroup">
          <label class="form-label">Roll Number (Students)</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
            <input type="text" id="loginRollNumber" class="form-control" placeholder="SU74-BSCSM-F24-005"/>
          </div>
          <small class="form-text text-muted">(e.g. SU74-BSCSM-F24-005).</small>
        </div>
        <div class="mb-3 d-none" id="loginEmailGroup">
          <label class="form-label">Email Address</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" id="loginEmail" class="form-control" placeholder="you@university.edu" />
          </div>
          <small class="form-text text-muted">Supervisors, PBL Managers, and Evaluators sign in with email.</small>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" id="loginPassword" class="form-control" placeholder="Enter password" />
          </div>
          
        </div>
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="rememberMe"/>
            <label class="form-check-label small" for="rememberMe">Remember me</label>
          </div>
          <a href="#" class="small text-muted">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-login btn-primary w-100" id="loginBtn">
          <span id="loginBtnText">Sign In</span>
          <span id="loginSpinner" class="spinner-border spinner-border-sm d-none ms-1"></span>
        </button>
      </form>

      <hr class="my-3"/>
      <p class="text-center small text-muted mb-0">
        Don't have an account? <a href="pages/shared/register.html" class="text-primary">Register</a>
      </p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="assets/js/auth.js"></script>
</body>
</html>
