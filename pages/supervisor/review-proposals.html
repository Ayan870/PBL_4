<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Review Proposals – PBL Management System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="../../assets/css/theme-dark-purple.css" rel="stylesheet"/>
  <style>
    body{background:#f4f6f9;}
    .sidebar{min-height:100vh;background:#fff;border-right:1px solid #dee2e6;width:220px;position:fixed;top:0;left:0;}
    .sidebar .nav-link{color:#495057;font-size:0.9rem;padding:10px 16px;border-radius:6px;margin:2px 8px;}
    .sidebar .nav-link:hover{background:#f0f0ff;color:#4f46e5;}
    .sidebar .nav-link.active{background:#ede9fe;color:#4f46e5;font-weight:600;}
    .main{margin-left:220px;padding:24px;}
    @media(max-width:768px){.sidebar{display:none;}.main{margin-left:0;}}
  </style>
</head>
<body>
<div class="sidebar d-flex flex-column">
  <div class="p-3 border-bottom">
    <div class="d-flex align-items-center gap-2">
      <i class="bi bi-mortarboard-fill text-primary fs-4"></i>
      <span class="fw-bold text-primary">PBLMS</span>
    </div>
    <small class="text-muted">Project-Based Learning</small>
  </div>
  <nav class="flex-grow-1 py-2">
    <ul class="nav flex-column" id="sidebarNav"></ul>
  </nav>
  <div class="p-3 border-top">
    <div class="d-flex align-items-center gap-2 mb-2">
      <div class="rounded-circle bg-success text-white d-flex align-items-center justify-content-center" style="width:34px;height:34px;font-size:0.75rem;font-weight:700;" id="userAvatar">U</div>
      <div><div class="fw-semibold small" id="userName">User</div><div class="text-muted" style="font-size:0.72rem;" id="userRoleLabel">Supervisor</div></div>
    </div>
    <button class="btn btn-outline-danger btn-sm w-100" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Logout</button>
  </div>
</div>

<div class="main">
  <div class="mb-4">
    <h4 class="mb-0 fw-bold">Review Proposals</h4>
    <p class="text-muted small mb-0">Review and approve or reject student proposals</p>
  </div>

  <!-- Filters -->
  <div class="card border-0 shadow-sm mb-4">
    <div class="card-body py-2">
      <div class="row g-2">
        <div class="col-md-4"><input type="text" class="form-control form-control-sm" placeholder="Search proposals..." id="searchInput" oninput="filterTable()"/></div>
        <div class="col-md-3">
          <select class="form-select form-select-sm" id="filterSt" onchange="filterTable()">
            <option value="">All Status</option>
            <option value="Pending">Pending</option>
            <option value="Approved">Approved</option>
            <option value="Rejected">Rejected</option>
          </select>
        </div>
        <div class="col-md-3">
          <select class="form-select form-select-sm" id="filterDept" onchange="filterTable()">
            <option value="">All Departments</option>
            <option>Computer Science</option>
            <option>Software Engineering</option>
            <option>Electrical Engineering</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <!-- Table -->
  <div class="card border-0 shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0" id="proposalsTable">
          <thead class="table-light">
            <tr>
              <th>Title</th><th>Student</th><th>Department</th><th>Category</th><th>Submitted</th><th>Status</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="proposalsTbody">
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Review Modal -->
<div class="modal fade" id="reviewModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content border-0">
      <div class="modal-header">
        <h5 class="modal-title fw-bold" id="reviewModalTitle">Review Proposal</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="reviewModalBody"></div>
        <hr/>
        <div class="mb-3">
          <label class="form-label fw-semibold">Feedback / Comments</label>
          <textarea class="form-control" id="reviewComment" rows="3" placeholder="Write your feedback for the student..."></textarea>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Score (out of 100)</label>
          <input type="number" class="form-control" id="reviewScore" min="0" max="100" placeholder="e.g. 85"/>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-success" onclick="submitReview('approve')"><i class="bi bi-check-lg me-1"></i>Approve</button>
        <button class="btn btn-danger" onclick="submitReview('reject')"><i class="bi bi-x-lg me-1"></i>Reject</button>
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index:9999">
  <div id="reviewToast" class="toast align-items-center border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body fw-semibold" id="reviewToastMsg"></div>
      <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../assets/js/db.js"></script>
<script src="../../assets/js/app.js"></script>
<script>
let proposals = [];

let activeProposalId = null;

function fmtDate(ms) {
  if (!ms) return '—';
  try { return new Date(ms).toLocaleDateString(); } catch { return '—'; }
}

function normalizeName(s) {
  return String(s || '')
    .toLowerCase()
    .replace(/\b(sir|dr|prof|mr|mrs|ms)\b\.?/g, '')
    .replace(/[^a-z\s]/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

function isMyProposal(p) {
  const myName = normalizeName(sessionStorage.getItem('pbl_name') || '');
  if (!myName) return true;
  const sup = normalizeName(p?.supervisor || '');
  if (!sup) return true;

  const tokens = myName.split(' ').filter(t => t.length >= 3);
  if (!tokens.length) return true;
  return tokens.some(t => sup.includes(t));
}

function toViewModel(p) {
  const studentLabel = p.studentRoll && p.studentName
    ? `${p.studentName} — ${p.studentRoll}`
    : (p.studentName || p.studentRoll || '—');

  return {
    id: Number(p.id),
    title: p.title || '',
    student: studentLabel,
    dept: p.dept || '—',
    category: p.category || '—',
    date: fmtDate(p.submittedAt),
    status: p.status || 'Pending',
    abstract: p.abstract || '—',
    supervisor: p.supervisor || '—',
    semester: p.semester || '—',
    reviewComment: p.reviewComment || '',
    reviewScore: (typeof p.reviewScore === 'number' || p.reviewScore === null) ? p.reviewScore : null
  };
}

function renderTable(data) {
  const tbody = document.getElementById('proposalsTbody');
  if (!data.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">No proposals found.</td></tr>';
    return;
  }
  const bMap = {Pending:'bg-warning text-dark', Approved:'bg-success', Rejected:'bg-danger'};
  tbody.innerHTML = data.map(p => `
    <tr>
      <td><strong>${p.title}</strong></td>
      <td>${p.student}</td>
      <td>${p.dept}</td>
      <td><span class="badge bg-primary">${p.category}</span></td>
      <td><small>${p.date}</small></td>
      <td><span class="badge ${bMap[p.status]||'bg-secondary'}" id="status-${p.id}">${p.status}</span></td>
      <td>
        <div class="btn-group btn-group-sm">
          <button class="btn btn-outline-primary" onclick="openReview(${p.id})" title="Review"><i class="bi bi-eye"></i></button>
          ${p.status==='Pending' ? `
          <button class="btn btn-outline-success" onclick="quickAction(${p.id},'approve')" title="Approve"><i class="bi bi-check-lg"></i></button>
          <button class="btn btn-outline-danger" onclick="quickAction(${p.id},'reject')" title="Reject"><i class="bi bi-x-lg"></i></button>` : ''}
        </div>
      </td>
    </tr>
  `).join('');
}

function openReview(id) {
  activeProposalId = id;
  const p = proposals.find(x => x.id === id);
  document.getElementById('reviewModalTitle').textContent = p.title;
  document.getElementById('reviewModalBody').innerHTML = `
    <div class="row g-2 mb-3">
      <div class="col-6"><span class="text-muted small">Student</span><div class="fw-semibold">${p.student}</div></div>
      <div class="col-6"><span class="text-muted small">Department</span><div class="fw-semibold">${p.dept}</div></div>
      <div class="col-6"><span class="text-muted small">Category</span><div class="fw-semibold">${p.category}</div></div>
      <div class="col-6"><span class="text-muted small">Submitted</span><div class="fw-semibold">${p.date}</div></div>
      <div class="col-6"><span class="text-muted small">Supervisor</span><div class="fw-semibold">${p.supervisor}</div></div>
      <div class="col-6"><span class="text-muted small">Semester</span><div class="fw-semibold">${p.semester}</div></div>
    </div>
    <h6 class="fw-semibold">Abstract</h6>
    <p class="small text-muted">${p.abstract}</p>
  `;
  document.getElementById('reviewComment').value = p.reviewComment || '';
  document.getElementById('reviewScore').value = (p.reviewScore === null || typeof p.reviewScore === 'undefined') ? '' : String(p.reviewScore);
  new bootstrap.Modal(document.getElementById('reviewModal')).show();
}

function submitReview(action) {
  const p = proposals.find(x => x.id === activeProposalId);
  const status = action === 'approve' ? 'Approved' : 'Rejected';
  const comment = document.getElementById('reviewComment').value || '';
  const score = document.getElementById('reviewScore').value;
  const res = (typeof pblUpdateProposalStatus === 'function')
    ? pblUpdateProposalStatus(activeProposalId, status, { comment, score })
    : null;
  if (!res?.ok) {
    alert('Could not update proposal. Please refresh.');
    return;
  }
  loadProposals();
  p.status = action === 'approve' ? 'Approved' : 'Rejected';
  bootstrap.Modal.getInstance(document.getElementById('reviewModal')).hide();
  showToastMsg(action === 'approve' ? `✅ "${p.title}" approved!` : `❌ "${p.title}" rejected.`, action === 'approve' ? 'success' : 'danger');
  filterTable();
}

function quickAction(id, action) {
  const p = proposals.find(x => x.id === id);
  const status = action === 'approve' ? 'Approved' : 'Rejected';
  const res = (typeof pblUpdateProposalStatus === 'function')
    ? pblUpdateProposalStatus(id, status, { comment: '', score: '' })
    : null;
  if (!res?.ok) {
    alert('Could not update proposal. Please refresh.');
    return;
  }
  loadProposals();
  p.status = action === 'approve' ? 'Approved' : 'Rejected';
  showToastMsg(action === 'approve' ? `✅ "${p.title}" approved!` : `❌ "${p.title}" rejected.`, action === 'approve' ? 'success' : 'danger');
  filterTable();
}

function showToastMsg(msg, type) {
  const el  = document.getElementById('reviewToast');
  const txt = document.getElementById('reviewToastMsg');
  txt.textContent = msg;
  el.className = `toast align-items-center border-0 text-bg-${type}`;
  bootstrap.Toast.getOrCreateInstance(el, {delay:3000}).show();
}

function filterTable() {
  const q    = document.getElementById('searchInput').value.toLowerCase();
  const st   = document.getElementById('filterSt').value;
  const dept = document.getElementById('filterDept').value;
  const filtered = proposals.filter(p =>
    (!q    || p.title.toLowerCase().includes(q) || p.student.toLowerCase().includes(q)) &&
    (!st   || p.status === st) &&
    (!dept || p.dept === dept)
  );
  renderTable(filtered);
}

function buildNav() {
  const role = sessionStorage.getItem('pbl_role') || 'supervisor';
  const nav  = document.getElementById('sidebarNav');
  const lbl  = document.getElementById('userRoleLabel');
  if(lbl) lbl.textContent = role.charAt(0).toUpperCase()+role.slice(1);
  const supLinks = `<li><a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li><li><a class="nav-link active" href="review-proposals.html"><i class="bi bi-file-earmark-check me-2"></i>Review Proposals</a></li><li><a class="nav-link" href="my-students.html"><i class="bi bi-people me-2"></i>My Students</a></li><li><a class="nav-link" href="../shared/messages.html"><i class="bi bi-chat-dots me-2"></i>Messages</a></li><li><a class="nav-link" href="evaluation.html"><i class="bi bi-star me-2"></i>Evaluate</a></li><li><a class="nav-link" href="reports.html"><i class="bi bi-bar-chart me-2"></i>Reports</a></li>`;
  const adminLinks = `<li><a class="nav-link" href="admin-dashboard.html"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li><li><a class="nav-link" href="admin-users.html"><i class="bi bi-people me-2"></i>Users</a></li><li><a class="nav-link active" href="review-proposals.html"><i class="bi bi-file-earmark-text me-2"></i>All Proposals</a></li><li><a class="nav-link" href="evaluation.html"><i class="bi bi-star me-2"></i>Evaluations</a></li><li><a class="nav-link" href="reports.html"><i class="bi bi-bar-chart me-2"></i>Analytics</a></li><li><a class="nav-link" href="../shared/messages.html"><i class="bi bi-chat-dots me-2"></i>Messages</a></li>`;
  if(nav) nav.innerHTML = role==='admin' ? adminLinks : supLinks;
}

function loadProposals() {
  const all = (typeof pblProposalsRead === 'function') ? pblProposalsRead() : [];
  proposals = all.filter(isMyProposal).map(toViewModel).filter(p => Number.isFinite(p.id));
}

document.addEventListener('DOMContentLoaded', function(){
  buildNav();
  loadProposals();
  renderTable(proposals);
});
</script>
</body>
</html>
