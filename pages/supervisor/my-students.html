<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Students – PBL Management System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="../../assets/css/theme-dark-purple.css" rel="stylesheet"/>
  <style>
    body{background:#f4f6f9;}
    .sidebar{min-height:100vh;background:#fff;border-right:1px solid #dee2e6;width:220px;position:fixed;top:0;left:0;}
    .sidebar .nav-link{color:#495057;font-size:0.9rem;padding:10px 16px;border-radius:6px;margin:2px 8px;}
    .sidebar .nav-link:hover{background:#f0f0ff;color:#4f46e5;}
    .sidebar .nav-link.active{background:#ede9fe;color:#4f46e5;font-weight:600;}
    .main{margin-left:220px;padding:24px;}
    @media(max-width:768px){.sidebar{display:none;}.main{margin-left:0;}}
  </style>
</head>
<body>
<div class="sidebar d-flex flex-column">
  <div class="p-3 border-bottom">
    <div class="d-flex align-items-center gap-2">
      <i class="bi bi-mortarboard-fill text-primary fs-4"></i>
      <span class="fw-bold text-primary">PBLMS</span>
    </div>
    <small class="text-muted">Project-Based Learning</small>
  </div>
  <nav class="flex-grow-1 py-2"><ul class="nav flex-column" id="sidebarNav"></ul></nav>
  <div class="p-3 border-top">
    <div class="d-flex align-items-center gap-2 mb-2">
      <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center" style="width:34px;height:34px;font-size:0.75rem;font-weight:700;" id="userAvatar">U</div>
      <div>
        <div class="fw-semibold small" id="userName">User</div>
        <div class="text-muted" style="font-size:0.72rem;" id="userRoleLabel">Supervisor</div>
      </div>
    </div>
    <button class="btn btn-outline-danger btn-sm w-100" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Logout</button>
  </div>
</div>

<div class="main">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h4 class="mb-0 fw-bold" id="pageTitle">My Students</h4>
      <p class="text-muted small mb-0" id="programHint">Students in your program</p>
    </div>
  </div>

  <div class="card border-0 shadow-sm mb-3">
    <div class="card-body py-2">
      <div class="row g-2 align-items-center">
        <div class="col-md-5">
          <input type="text" class="form-control form-control-sm" placeholder="Search by name or roll number..." id="searchStudent" oninput="renderStudents()"/>
        </div>
        <div class="col-md-3">
          <select class="form-select form-select-sm" id="programFilter" onchange="renderStudents()">
            <option value="">All Programs</option>
          </select>
        </div>
        <div class="col-md-4 text-md-end">
          <span class="small text-muted" id="countLabel"></span>
        </div>
      </div>
    </div>
  </div>

  <div class="card border-0 shadow-sm">
    <div class="table-responsive">
      <table class="table table-sm align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th style="width: 32px;"></th>
            <th>Roll Number</th>
            <th>Name</th>
            <th>Program</th>
          </tr>
        </thead>
        <tbody id="studentsTbody"></tbody>
      </table>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../assets/js/db.js"></script>
<script src="../../assets/js/app.js"></script>
<script>
function buildNav() {
  const nav  = document.getElementById('sidebarNav');
  if (!nav) return;
  nav.innerHTML =
    `<li><a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
     <li><a class="nav-link" href="review-proposals.html"><i class="bi bi-file-earmark-check me-2"></i>Review Proposals</a></li>
     <li><a class="nav-link active" href="my-students.html"><i class="bi bi-people me-2"></i>My Students</a></li>
     <li><a class="nav-link" href="../shared/messages.html"><i class="bi bi-chat-dots me-2"></i>Messages</a></li>
     <li><a class="nav-link" href="evaluation.html"><i class="bi bi-star me-2"></i>Evaluate</a></li>
     <li><a class="nav-link" href="reports.html"><i class="bi bi-bar-chart me-2"></i>Reports</a></li>`;
}

function normalize(s) {
  return String(s || '').trim().toLowerCase();
}

function getSupervisorProgram() {
  const fromSession = (sessionStorage.getItem('pbl_program') || '').trim();
  if (fromSession) return fromSession;

  const email = (sessionStorage.getItem('pbl_email') || '').trim();
  if (email && typeof pblFindUserByEmail === 'function') {
    const u = pblFindUserByEmail('supervisor', email);
    if (u && u.program) {
      sessionStorage.setItem('pbl_program', u.program);
      return u.program;
    }
  }
  return '';
}

function listAllStudents() {
  if (typeof pblAllUsers !== 'function') return [];
  return (pblAllUsers() || []).filter(u => (u?.role || '') === 'student');
}

function uniqPrograms(students) {
  const set = new Set();
  students.forEach(s => {
    const p = String(s?.program || '').trim();
    if (p) set.add(p);
  });
  return Array.from(set).sort((a, b) => a.localeCompare(b));
}

function initProgramFilter() {
  const students = listAllStudents();
  const programs = uniqPrograms(students);
  const sel = document.getElementById('programFilter');
  if (!sel) return;

  const current = String(sel.value || '').trim();
  sel.innerHTML = `<option value="">All Programs</option>` + programs.map(p => `<option value="${p}">${p}</option>`).join('');
  if (current) sel.value = current;
}

function renderStudents() {
  const tbody = document.getElementById('studentsTbody');
  const countLabel = document.getElementById('countLabel');
  const q = normalize(document.getElementById('searchStudent')?.value);
  const programFilter = String(document.getElementById('programFilter')?.value || '').trim();

  const students = listAllStudents();
  const filtered = students.filter(s => {
    const name = normalize(s?.name);
    const roll = normalize(s?.rollNumber);
    const prog = String(s?.program || '').trim();

    const matchesQuery = !q || name.includes(q) || roll.includes(q);
    const matchesProgram = !programFilter || prog.toLowerCase() === programFilter.toLowerCase();
    return matchesQuery && matchesProgram;
  });

  if (countLabel) countLabel.textContent = `${filtered.length} student(s)`;
  if (!tbody) return;

  if (!filtered.length) {
    tbody.innerHTML = `<tr><td colspan="4" class="text-center text-muted py-4">No students found.</td></tr>`;
    return;
  }

  tbody.innerHTML = filtered.map(s => {
    const initials = String(s?.name || 'S').split(' ').filter(Boolean).map(p => p[0]).join('').slice(0,2).toUpperCase();
    return `
      <tr>
        <td><div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center" style="width:28px;height:28px;font-size:0.72rem;font-weight:700;">${initials || 'S'}</div></td>
        <td class="small fw-semibold">${s.rollNumber || '-'}</td>
        <td class="small">${s.name || '-'}</td>
        <td class="small text-muted">${s.program || '-'}</td>
      </tr>
    `;
  }).join('');
}

document.addEventListener('DOMContentLoaded', function() {
  const role = sessionStorage.getItem('pbl_role') || '';
  if (role !== 'supervisor') {
    window.location.href = (typeof pblUrlFromRoot === 'function') ? pblUrlFromRoot('index.html') : '../../index.html';
    return;
  }

  buildNav();
  initProgramFilter();

  const supervisorProgram = getSupervisorProgram();
  const hint = document.getElementById('programHint');
  const sel = document.getElementById('programFilter');
  if (supervisorProgram) {
    if (hint) hint.textContent = `Students in program: ${supervisorProgram}`;
    if (sel) sel.value = supervisorProgram;
  } else {
    if (hint) hint.textContent = 'No program assigned to this supervisor (showing all students).';
  }

  renderStudents();
});
</script>
</body>
</html>
