<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Projects – PBL Management System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <style>
    body{background:#f4f6f9;}
    .sidebar{min-height:100vh;background:#fff;border-right:1px solid #dee2e6;width:220px;position:fixed;top:0;left:0;}
    .sidebar .nav-link{color:#495057;font-size:0.9rem;padding:10px 16px;border-radius:6px;margin:2px 8px;}
    .sidebar .nav-link:hover{background:#f0f0ff;color:#4f46e5;}
    .sidebar .nav-link.active{background:#ede9fe;color:#4f46e5;font-weight:600;}
    .main{margin-left:220px;padding:24px;}
    .project-card{border:1px solid #dee2e6;border-radius:10px;background:#fff;transition:box-shadow 0.2s;}
    .project-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.1);}
    @media(max-width:768px){.sidebar{display:none;}.main{margin-left:0;}}
  </style>
</head>
<body>
<div class="sidebar d-flex flex-column">
  <div class="p-3 border-bottom">
    <div class="d-flex align-items-center gap-2">
      <i class="bi bi-mortarboard-fill text-primary fs-4"></i>
      <span class="fw-bold text-primary">PBLMS</span>
    </div>
    <small class="text-muted">Project-Based Learning</small>
  </div>
  <nav class="flex-grow-1 py-2"><ul class="nav flex-column" id="sidebarNav"></ul></nav>
  <div class="p-3 border-top">
    <div class="d-flex align-items-center gap-2 mb-2">
      <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center" style="width:34px;height:34px;font-size:0.75rem;font-weight:700;" id="userAvatar">U</div>
      <div><div class="fw-semibold small" id="userName">User</div><div class="text-muted" style="font-size:0.72rem;" id="userRoleLabel">Student</div></div>
    </div>
    <button class="btn btn-outline-danger btn-sm w-100" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Logout</button>
  </div>
</div>

<div class="main">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h4 class="mb-0 fw-bold" id="pageTitle">My Projects</h4>
      <p class="text-muted small mb-0">All your submitted PBL projects</p>
    </div>
    <a href="submit-proposal.html" class="btn btn-primary" id="newProposalBtn"><i class="bi bi-plus-lg me-1"></i> New Proposal</a>
  </div>

  <!-- Filter -->
  <div class="card border-0 shadow-sm mb-4">
    <div class="card-body py-2">
      <div class="row g-2 align-items-center">
        <div class="col-md-4">
          <input type="text" class="form-control form-control-sm" placeholder="Search projects..." id="searchProj" oninput="filterProjects()"/>
        </div>
        <div class="col-md-3">
          <select class="form-select form-select-sm" id="filterStatus" onchange="filterProjects()">
            <option value="">All Status</option>
            <option value="approved">Approved</option>
            <option value="pending">Pending</option>
            <option value="rejected">Rejected</option>
          </select>
        </div>
        <div class="col-md-3">
          <select class="form-select form-select-sm" id="filterSem" onchange="filterProjects()">
            <option value="">All Semesters</option>
            <option value="Spring 2025">Spring 2025</option>
            <option value="Fall 2024">Fall 2024</option>
            <option value="Spring 2024">Spring 2024</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <!-- Projects -->
  <div class="row g-3" id="projectsGrid">
    <!-- Rendered by JS -->
  </div>
</div>

<!-- View Modal -->
<div class="modal fade" id="projectModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content border-0">
      <div class="modal-header">
        <h5 class="modal-title fw-bold" id="modalTitle">Project Details</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer">
        <a href="../shared/messages.html" class="btn btn-primary btn-sm"><i class="bi bi-chat-dots me-1"></i>Message Supervisor</a>
        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../assets/js/app.js"></script>
<script>
const projects = [];

let filtered = [...projects];

function renderProjects(list) {
  const grid = document.getElementById('projectsGrid');
  if (!list.length) {
    grid.innerHTML = `<div class="col-12 text-center py-5 text-muted"><i class="bi bi-folder-x fs-1 d-block mb-2"></i>No projects found.</div>`;
    return;
  }
  grid.innerHTML = list.map(p => {
    const statusBadge = {approved:'bg-success', pending:'bg-warning text-dark', rejected:'bg-danger'}[p.status] || 'bg-secondary';
    const statusLabel = p.status.charAt(0).toUpperCase()+p.status.slice(1);
    return `
    <div class="col-md-6 col-lg-4">
      <div class="project-card p-3">
        <div class="d-flex justify-content-between align-items-start mb-2">
          <span class="badge ${statusBadge}">${statusLabel}</span>
          <span class="text-muted small">${p.semester}</span>
        </div>
        <h6 class="fw-bold mb-1">${p.title}</h6>
        <p class="small text-muted mb-2">${p.abstract.substring(0,80)}…</p>
        <div class="row g-1 mb-2 small text-muted">
          <div class="col-6"><i class="bi bi-person me-1"></i>${p.supervisor}</div>
          <div class="col-6"><i class="bi bi-tag me-1"></i>${p.category}</div>
        </div>
        ${p.status==='approved' ? `
        <div class="mb-2">
          <div class="d-flex justify-content-between small mb-1"><span>Progress</span><span>${p.progress}%</span></div>
          <div class="progress" style="height:6px;"><div class="progress-bar bg-primary" style="width:${p.progress}%"></div></div>
        </div>` : ''}
        ${p.score ? `<div class="small mb-2"><strong>Score:</strong> <span class="text-primary fw-bold">${p.score}/100</span></div>` : ''}
        <button class="btn btn-sm btn-outline-primary w-100 mt-1" onclick="viewProject(${p.id})">
          <i class="bi bi-eye me-1"></i>View Details
        </button>
      </div>
    </div>`;
  }).join('');
}

function viewProject(id) {
  const p = projects.find(x => x.id === id);
  if (!p) return;
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalBody').innerHTML = `
    <div class="row g-2 mb-3">
      <div class="col-6"><span class="text-muted small">Department</span><div class="fw-semibold">${p.dept}</div></div>
      <div class="col-6"><span class="text-muted small">Category</span><div class="fw-semibold">${p.category}</div></div>
      <div class="col-6"><span class="text-muted small">Semester</span><div class="fw-semibold">${p.semester}</div></div>
      <div class="col-6"><span class="text-muted small">Supervisor</span><div class="fw-semibold">${p.supervisor}</div></div>
      <div class="col-6"><span class="text-muted small">Status</span><div><span class="badge bg-success">${p.status}</span></div></div>
      ${p.score ? `<div class="col-6"><span class="text-muted small">Score</span><div class="fw-bold text-primary">${p.score}/100</div></div>` : ''}
    </div>
    <hr/>
    <h6 class="fw-semibold">Abstract</h6>
    <p class="small text-muted">${p.abstract}</p>
    ${p.status==='approved' ? `<h6 class="fw-semibold">Progress</h6>
    <div class="progress mb-1" style="height:10px;"><div class="progress-bar" style="width:${p.progress}%"></div></div>
    <small class="text-muted">${p.progress}% completed</small>` : ''}
  `;
  new bootstrap.Modal(document.getElementById('projectModal')).show();
}

function filterProjects() {
  const q   = document.getElementById('searchProj').value.toLowerCase();
  const st  = document.getElementById('filterStatus').value;
  const sem = document.getElementById('filterSem').value;
  filtered = projects.filter(p =>
    (!q   || p.title.toLowerCase().includes(q)) &&
    (!st  || p.status === st) &&
    (!sem || p.semester === sem)
  );
  renderProjects(filtered);
}

function buildNav() {
  const role = sessionStorage.getItem('pbl_role') || 'student';
  const nav  = document.getElementById('sidebarNav');
  const lbl  = document.getElementById('userRoleLabel');
  const title = document.getElementById('pageTitle');
  const btn   = document.getElementById('newProposalBtn');
  if(lbl) lbl.textContent = role.charAt(0).toUpperCase()+role.slice(1);
  if(role==='supervisor'){ if(title) title.textContent='My Students'; if(btn) btn.style.display='none'; }
  const links = {
    student:`<li><a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li><li><a class="nav-link" href="submit-proposal.html"><i class="bi bi-file-earmark-plus me-2"></i>Submit Proposal</a></li><li><a class="nav-link active" href="my-projects.html"><i class="bi bi-folder me-2"></i>My Projects</a></li><li><a class="nav-link" href="../shared/messages.html"><i class="bi bi-chat-dots me-2"></i>Messages</a></li><li><a class="nav-link" href="feedback.html"><i class="bi bi-hand-thumbs-up me-2"></i>Feedback</a></li><li><a class="nav-link" href="results.html"><i class="bi bi-bar-chart me-2"></i>Results</a></li>`,
    supervisor:`<li><a class="nav-link" href="supervisor-dashboard.html"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li><li><a class="nav-link" href="review-proposals.html"><i class="bi bi-file-earmark-check me-2"></i>Review Proposals</a></li><li><a class="nav-link active" href="my-projects.html"><i class="bi bi-people me-2"></i>My Students</a></li><li><a class="nav-link" href="../shared/messages.html"><i class="bi bi-chat-dots me-2"></i>Messages</a></li><li><a class="nav-link" href="evaluation.html"><i class="bi bi-star me-2"></i>Evaluate</a></li><li><a class="nav-link" href="results.html"><i class="bi bi-bar-chart me-2"></i>Reports</a></li>`
  };
  if(nav) nav.innerHTML = links[role] || links.student;
}

document.addEventListener('DOMContentLoaded', function(){ buildNav(); renderProjects(projects); });
</script>
</body>
</html>
