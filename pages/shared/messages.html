<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Messages – PBL Management System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <style>
    body { background: #f4f6f9; }
    .sidebar { min-height:100vh; background:#fff; border-right:1px solid #dee2e6; width:220px; position:fixed; top:0; left:0; }
    .sidebar .nav-link { color:#495057; font-size:0.9rem; padding:10px 16px; border-radius:6px; margin:2px 8px; }
    .sidebar .nav-link:hover { background:#f0f0ff; color:#4f46e5; }
    .sidebar .nav-link.active { background:#ede9fe; color:#4f46e5; font-weight:600; }
    .main { margin-left:220px; padding:24px; }

    /* Chat layout */
    .chat-container { height: calc(100vh - 160px); display:flex; gap:16px; }
    .contact-list { width:280px; flex-shrink:0; background:#fff; border:1px solid #dee2e6; border-radius:10px; overflow-y:auto; }
    .chat-window { flex:1; display:flex; flex-direction:column; background:#fff; border:1px solid #dee2e6; border-radius:10px; overflow:hidden; }

    /* Contact item */
    .contact-item { display:flex; gap:10px; align-items:center; padding:12px 14px; border-bottom:1px solid #f0f0f0; cursor:pointer; transition:background 0.15s; }
    .contact-item:hover { background:#f8f9fa; }
    .contact-item.active { background:#ede9fe; }
    .contact-avatar { width:40px; height:40px; border-radius:50%; font-size:0.85rem; font-weight:700; color:#fff; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .contact-info { flex:1; min-width:0; }
    .contact-name { font-size:0.88rem; font-weight:600; color:#212529; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .contact-preview { font-size:0.75rem; color:#6c757d; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .contact-meta { font-size:0.7rem; color:#adb5bd; text-align:right; flex-shrink:0; }

    /* Chat header */
    .chat-header { padding:12px 16px; border-bottom:1px solid #dee2e6; display:flex; align-items:center; gap:10px; background:#fff; }

    /* Message area */
    .chat-messages { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:10px; background:#f8f9fa; }
    .msg-bubble { max-width:65%; padding:10px 14px; border-radius:12px; font-size:0.875rem; line-height:1.5; }
    .msg-received { background:#fff; border:1px solid #dee2e6; align-self:flex-start; border-radius:4px 12px 12px 12px; }
    .msg-sent { background:#4f46e5; color:#fff; align-self:flex-end; border-radius:12px 4px 12px 12px; }
    .msg-time { font-size:0.68rem; color:#adb5bd; margin-top:3px; }
    .msg-sent .msg-time { color:rgba(255,255,255,0.7); text-align:right; }

    /* Chat input */
    .chat-input { padding:12px; border-top:1px solid #dee2e6; display:flex; gap:8px; background:#fff; }
    .chat-input input { border-radius:20px; }
    .chat-input button { border-radius:50%; width:40px; height:40px; padding:0; display:flex; align-items:center; justify-content:center; flex-shrink:0; }

    /* Empty state */
    .empty-chat { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#adb5bd; background:#f8f9fa; }

    @media(max-width:768px){ .sidebar{display:none;} .main{margin-left:0; padding:16px;} .contact-list{width:100%;} .chat-container{flex-direction:column; height:auto;} .chat-window{min-height:400px;} }
  </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar d-flex flex-column">
  <div class="p-3 border-bottom">
    <div class="d-flex align-items-center gap-2">
      <i class="bi bi-mortarboard-fill text-primary fs-4"></i>
      <span class="fw-bold text-primary">PBLMS</span>
    </div>
    <small class="text-muted">Project-Based Learning</small>
  </div>
  <nav class="flex-grow-1 py-2">
    <ul class="nav flex-column" id="sidebarNav">
      <!-- Links injected by JS based on role -->
    </ul>
  </nav>
  <div class="p-3 border-top">
    <div class="d-flex align-items-center gap-2 mb-2">
      <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center" style="width:34px;height:34px;font-size:0.75rem;font-weight:700;" id="userAvatar">U</div>
      <div>
        <div class="fw-semibold small" id="userName">User</div>
        <div class="text-muted" style="font-size:0.72rem;" id="userRoleLabel">Student</div>
      </div>
    </div>
    <button class="btn btn-outline-danger btn-sm w-100" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Logout</button>
  </div>
</div>

<!-- Main Content -->
<div class="main">
  <div class="mb-3">
    <h4 class="mb-0 fw-bold">Messages</h4>
    <p class="text-muted small mb-0">Communicate with your supervisor or students</p>
  </div>

  <div class="chat-container">
    <!-- Contact List -->
    <div class="contact-list">
      <div class="p-2 border-bottom">
        <div class="input-group input-group-sm">
          <span class="input-group-text border-0 bg-light"><i class="bi bi-search text-muted"></i></span>
          <input type="text" class="form-control border-0 bg-light" placeholder="Search..." id="searchContacts" oninput="filterContacts(this.value)"/>
        </div>
      </div>
      <div id="contactListBody">
        <!-- Contacts rendered by JS -->
      </div>
    </div>

    <!-- Chat Window -->
    <div class="chat-window" id="chatWindow">
      <!-- Empty state -->
      <div class="empty-chat" id="emptyChat">
        <i class="bi bi-chat-dots fs-1 mb-3"></i>
        <p class="fw-semibold">Select a conversation</p>
        <p class="small">Choose a contact from the left to start chatting</p>
      </div>

      <!-- Active chat (hidden until contact selected) -->
      <div id="activeChat" style="display:none; flex-direction:column; height:100%;">
        <div class="chat-header">
          <div class="contact-avatar" id="chatAvatar" style="width:36px;height:36px;font-size:0.8rem;"></div>
          <div>
            <div class="fw-semibold small" id="chatName">-</div>
            <div class="text-muted" style="font-size:0.72rem;" id="chatRole">-</div>
          </div>
          <span class="badge bg-success ms-auto">Online</span>
        </div>

        <div class="chat-messages" id="chatMessages"></div>

        <div class="chat-input">
          <input type="text" id="messageInput" class="form-control form-control-sm" placeholder="Type a message..." onkeydown="if(event.key==='Enter') sendMessage()"/>
          <button class="btn btn-primary" onclick="sendMessage()" title="Send">
            <i class="bi bi-send-fill" style="font-size:0.85rem;"></i>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../assets/js/app.js"></script>
<script>
/* ===== Chat Data ===== */
const contacts = [];

let activeContactId = null;

/* ===== Render Contacts ===== */
function renderContacts(list) {
  const body = document.getElementById('contactListBody');
  if (!list.length) {
    body.innerHTML = `
      <div class="p-4 text-center text-muted">
        <i class="bi bi-chat-left-dots fs-2 d-block mb-2"></i>
        No conversations yet.
      </div>
    `;
    return;
  }
  body.innerHTML = list.map(c => `
    <div class="contact-item ${activeContactId === c.id ? 'active' : ''}" onclick="openChat(${c.id})">
      <div class="contact-avatar" style="background:${c.color};">${c.initials}</div>
      <div class="contact-info">
        <div class="contact-name">${c.name}</div>
        <div class="contact-preview">${c.preview}</div>
      </div>
      <div class="contact-meta">
        ${c.unread > 0 ? `<span class="badge bg-danger rounded-pill mb-1">${c.unread}</span><br/>` : ''}
        <span>Now</span>
      </div>
    </div>
  `).join('');
}

/* ===== Open Chat ===== */
function openChat(id) {
  activeContactId = id;
  const contact = contacts.find(c => c.id === id);
  if (!contact) return;

  // Mark unread as 0
  contact.unread = 0;
  renderContacts(contacts);

  // Show active chat
  document.getElementById('emptyChat').style.display   = 'none';
  const activeDiv = document.getElementById('activeChat');
  activeDiv.style.display = 'flex';

  // Set header
  const av = document.getElementById('chatAvatar');
  av.textContent   = contact.initials;
  av.style.background = contact.color;
  document.getElementById('chatName').textContent = contact.name;
  document.getElementById('chatRole').textContent = contact.role;

  // Render messages
  renderMessages(contact.messages);
  document.getElementById('messageInput').focus();
}

/* ===== Render Messages ===== */
function renderMessages(messages) {
  const box = document.getElementById('chatMessages');
  box.innerHTML = messages.map(m => `
    <div style="display:flex; flex-direction:column; align-items:${m.from === 'me' ? 'flex-end' : 'flex-start'};">
      <div class="msg-bubble ${m.from === 'me' ? 'msg-sent' : 'msg-received'}">${m.text}</div>
      <div class="msg-time">${m.time}</div>
    </div>
  `).join('');
  box.scrollTop = box.scrollHeight;
}

/* ===== Send Message ===== */
function sendMessage() {
  const input   = document.getElementById('messageInput');
  const text    = input.value.trim();
  if (!text || activeContactId === null) return;

  const contact = contacts.find(c => c.id === activeContactId);
  if (!contact) return;

  const now = new Date();
  const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

  contact.messages.push({ from: 'me', text, time });
  contact.preview = text;
  input.value = '';

  renderMessages(contact.messages);
  renderContacts(contacts);
}

/* ===== Filter Contacts ===== */
function filterContacts(query) {
  const filtered = contacts.filter(c =>
    c.name.toLowerCase().includes(query.toLowerCase())
  );
  renderContacts(filtered);
}

/* ===== Sidebar nav based on role ===== */
function buildSidebarNav() {
  const role = sessionStorage.getItem('pbl_role') || 'student';
  const nav  = document.getElementById('sidebarNav');
  const roleLabel = document.getElementById('userRoleLabel');
  if (roleLabel) roleLabel.textContent = role.charAt(0).toUpperCase() + role.slice(1);

  const studentLinks = `
    <li><a class="nav-link" href="../student/dashboard.html"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
    <li><a class="nav-link" href="../student/submit-proposal.html"><i class="bi bi-file-earmark-plus me-2"></i>Submit Proposal</a></li>
    <li><a class="nav-link" href="../student/my-projects.html"><i class="bi bi-folder me-2"></i>My Projects</a></li>
    <li><a class="nav-link active" href="messages.html"><i class="bi bi-chat-dots me-2"></i>Messages</a></li>
    <li><a class="nav-link" href="../student/feedback.html"><i class="bi bi-hand-thumbs-up me-2"></i>Feedback</a></li>
    <li><a class="nav-link" href="../student/results.html"><i class="bi bi-bar-chart me-2"></i>Results</a></li>
  `;
  const supervisorLinks = `
    <li><a class="nav-link" href="../supervisor/dashboard.html"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
    <li><a class="nav-link" href="../supervisor/review-proposals.html"><i class="bi bi-file-earmark-check me-2"></i>Review Proposals</a></li>
    <li><a class="nav-link" href="../student/my-projects.html"><i class="bi bi-people me-2"></i>My Students</a></li>
    <li><a class="nav-link active" href="messages.html"><i class="bi bi-chat-dots me-2"></i>Messages</a></li>
    <li><a class="nav-link" href="../supervisor/evaluation.html"><i class="bi bi-star me-2"></i>Evaluate</a></li>
    <li><a class="nav-link" href="../student/results.html"><i class="bi bi-bar-chart me-2"></i>Reports</a></li>
  `;
  const adminLinks = `
    <li><a class="nav-link" href="../manager/dashboard.html"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
    <li><a class="nav-link" href="admin-users.html"><i class="bi bi-people me-2"></i>Users</a></li>
    <li><a class="nav-link" href="../supervisor/review-proposals.html"><i class="bi bi-file-earmark-text me-2"></i>All Proposals</a></li>
    <li><a class="nav-link" href="../supervisor/evaluation.html"><i class="bi bi-star me-2"></i>Evaluations</a></li>
    <li><a class="nav-link" href="../student/results.html"><i class="bi bi-bar-chart me-2"></i>Analytics</a></li>
    <li><a class="nav-link active" href="messages.html"><i class="bi bi-chat-dots me-2"></i>Messages</a></li>
  `;

  if (nav) {
    nav.innerHTML = role === 'supervisor' ? supervisorLinks : role === 'admin' ? adminLinks : studentLinks;
  }
}

/* ===== Init ===== */
document.addEventListener('DOMContentLoaded', function () {
  buildSidebarNav();
  renderContacts(contacts);
});
</script>
</body>
</html>
