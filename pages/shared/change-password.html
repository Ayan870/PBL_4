<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Change Password â€“ PBL Management System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="../../assets/css/theme-dark-purple.css" rel="stylesheet"/>
  <style>
    body { background:#f4f6f9; }
    .card-wrap { max-width: 520px; margin: 70px auto; }
    .brand-title { color:#4f46e5; font-weight:700; }
  </style>
</head>
<body>

<div class="card-wrap px-3">
  <div class="text-center mb-4">
    <i class="bi bi-key-fill fs-1 text-primary"></i>
    <h3 class="brand-title mt-2">Change Password</h3>
    <p class="text-muted small mb-0" id="whoLabel"></p>
  </div>

  <div class="card shadow-sm border-0">
    <div class="card-body p-4">
      <form id="changePwForm">
        <div class="mb-3">
          <label class="form-label">Current Password</label>
          <input type="password" class="form-control" id="currentPw" required />
        </div>
        <div class="mb-3">
          <label class="form-label">New Password</label>
          <input type="password" class="form-control" id="newPw" minlength="4" required />
        </div>
        <div class="mb-3">
          <label class="form-label">Confirm New Password</label>
          <input type="password" class="form-control" id="confirmPw" minlength="4" required />
        </div>

        <button type="submit" class="btn btn-primary w-100">
          <i class="bi bi-check2-circle me-1"></i> Update Password
        </button>
      </form>

      <div class="text-center mt-3">
        <a href="#" id="backLink" class="small text-muted">Back to dashboard</a>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../assets/js/db.js"></script>
<script src="../../assets/js/app.js"></script>
<script src="../../assets/js/change_password.js"></script>
</body>
</html>
