<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register – PBL Management System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <style>
    body { background: #f4f6f9; }
    .reg-card { max-width: 480px; margin: 60px auto; }
    .brand-title { color: #4f46e5; font-weight: 700; }
    .role-btn.active { background: #4f46e5; color: #fff; border-color: #4f46e5; }
    #pwStrengthBar { height: 5px; border-radius: 3px; transition: width 0.3s, background 0.3s; }
  </style>
</head>
<body>

<div class="reg-card px-3">
  <div class="text-center mb-4">
    <i class="bi bi-mortarboard-fill fs-1 text-primary"></i>
    <h3 class="brand-title mt-2">PBL Management System</h3>
    <p class="text-muted small">Create your account</p>
  </div>

  <div class="card shadow-sm border-0">
    <div class="card-body p-4">
      <h5 class="card-title mb-1">Register</h5>
      <p class="text-muted small mb-3">Join as Student or Supervisor</p>

      <div class="btn-group w-100 mb-3" role="group">
        <button class="btn btn-outline-primary role-btn active" onclick="selectRole('student', this)">Student</button>
        <button class="btn btn-outline-primary role-btn" onclick="selectRole('supervisor', this)">Supervisor</button>
      </div>

      <form onsubmit="handleRegister(event)">
        <div class="row g-2 mb-3">
          <div class="col-6">
            <label class="form-label">First Name</label>
            <input type="text" id="regFirst" class="form-control" placeholder="Ali" required/>
          </div>
          <div class="col-6">
            <label class="form-label">Last Name</label>
            <input type="text" id="regLast" class="form-control" placeholder="Khan" required/>
          </div>
        </div>

        <div class="mb-3" id="regIdGroup">
          <label class="form-label">Roll Number</label>
          <input type="text" id="regStudentId" class="form-control" placeholder="e.g. 2022-CS-001"/>
        </div>

        <div class="mb-3">
          <label class="form-label">Department</label>
          <select id="regDept" class="form-select" required>
            <option value="">Select Department</option>
            <option>CS & IT</option>
            <option>Medical</option>
            <option>Business</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Program</label>
          <select id="regProgram" class="form-select" required>
            <option value="">Select Program</option>
            <option>BS-CS</option>
            <option>BS-IT</option>
            <option>BS-AI</option>
            <option>BS-Robotics</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Email Address</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" id="regEmail" class="form-control" placeholder="you@university.edu" required/>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" id="regPassword" class="form-control" placeholder="Min. 8 characters" required/>
          </div>
          <div class="mt-1" style="background:#e9ecef;border-radius:3px;">
            <div id="pwStrengthBar" style="width:0%;height:5px;border-radius:3px;"></div>
          </div>
          <small id="pwStrengthLabel" class="text-muted">Enter password</small>
        </div>

        <button type="submit" class="btn btn-primary w-100">
          <i class="bi bi-person-plus me-1"></i> Create Account
        </button>
      </form>

      <hr class="my-3"/>
      <p class="text-center small text-muted mb-0">
        Already have an account? <a href="../../index.html" class="text-primary">Sign In</a>
      </p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../assets/js/auth.js"></script>
<script>
  document.getElementById('regPassword').addEventListener('input', function() {
    const v = this.value;
    const bar = document.getElementById('pwStrengthBar');
    const lbl = document.getElementById('pwStrengthLabel');
    let s = 0;
    if (v.length >= 8) s++;
    if (/[A-Z]/.test(v)) s++;
    if (/[0-9]/.test(v)) s++;
    if (/[^A-Za-z0-9]/.test(v)) s++;
    const pct = (s / 4) * 100;
    bar.style.width = pct + '%';
    const states = ['', 'Weak', 'Fair', 'Good', 'Strong'];
    const colors = ['', '#ef4444', '#f59e0b', '#3b82f6', '#22c55e'];
    bar.style.background = colors[s] || '';
    lbl.textContent = states[s] || 'Enter password';
    lbl.style.color = colors[s] || '';
  });
</script>
</body>
</html>
